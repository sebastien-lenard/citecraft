name: "Report an Issue"
description: "Found a bug or something broken? Let's fix it together!"
title: "Process impacted, e.g. bibliography generation: A few words of description, e.g. Missing author initials"
labels: ["status: triage"]
body:
  # 1. Warm welcome message
  - type: markdown
    attributes:
      value: |
        ### 👋 Thank you for helping improve the project!
        Whether you are a researcher racing against a deadline or a student writing a paper, your feedback is incredibly valuable. Let's get this sorted out for you.

  # 2. Friendly Severity Dropdown
  - type: dropdown
    id: impact
    attributes:
      label: "How badly is this affecting your work? 🛑"
      description: "Select the option that best matches your situation."
      options:
        - "Minor — Just a small annoyance, typo, or minor visual issue"
        - "Major — It works, but a major feature or citation style is broken"
        - "Critical — I can't generate my bibliography at all / it crashes"
        
    validations:
      required: true

  # 3. Simple Description
  - type: textarea
    id: description
    attributes:
      label: "What happened? 📝"
      description: "A quick 1-2 sentence summary of what went wrong."
      placeholder: "e.g., When I try to export an Earth Surface Dynamics style bibliography, the author initials are missing."
    validations:
      required: true

  # 4. Short Steps
  - type: textarea
    id: steps
    attributes:
      label: "How can I recreate it? 👣"
      description: "A quick 1-3 sentence walkthrough of what you clicked or did."
      placeholder: |
        1. Generated bibliography from a .docx file containing images and tables for Earth Surface Dynamics style
        2. The output gave me references with authors missing given name initials for citations in the tables
    validations:
      required: false

  # 5. Optional Data/Logs
  - type: textarea
    id: context
    attributes:
      label: "Optional: Links, citation data, or logs 📋"
      description: "If you have the specific DOI, BibTeX data, error logs, or a screenshot, paste them here!"
      placeholder: |
        e.g., Guns, and Vanacker: Shifts in landslide frequency–area distribution after forest conversion in the tropical Andes, Anthropocene, 6, 75–85, https://doi.org/10.1016/j.ancene.2014.08.001, 2014.
        Should be: Guns, M. and Vanacker, V.: Shifts in landslide frequency–area distribution after forest conversion in the tropical Andes, Anthropocene, 6, 75–85, https://doi.org/10.1016/j.ancene.2014.08.001, 2014."
    validations:
      required: false
