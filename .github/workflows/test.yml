name: Run Unit Tests

on:
  push:
    branches: [ "main", "master" ] # Change this if your default branch has a different name
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # This triggers 3 parallel jobs: Ubuntu (Linux), Windows, and macOS
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install uv and Python
      uses: astral-sh/setup-uv@v5
      with:
        # This automatically installs Python 3.12.9
        python-version: "3.12.9"
        enable-cache: true

    - name: Create dummy .env file
      run: cp .env.example .env
      shell: bash

    - name: Run Pytest (Linux)
      # This step only runs on the Ubuntu machine
      if: matrix.os == 'ubuntu-latest'
      run: xvfb-run uv run pytest -m unit

    - name: Run Pytest (Windows & macOS)
      # This step runs on Windows and Mac, skipping the virtual screen wrapper
      if: matrix.os != 'ubuntu-latest'
      run: uv run pytest -m unit
